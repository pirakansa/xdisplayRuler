version: 1

vars:
  PROJECT_NAME: "xdisplay-ruler"
  LINUX_AMD64_MUSL_TARGET: "x86_64-unknown-linux-musl"
  LINUX_ARM64_MUSL_TARGET: "aarch64-unknown-linux-musl"

tasks:
  build:
    run: cargo build --locked
    desc: Build debug artifacts

  run:
    run: RUST_LOG=debug cargo run
    desc: Run the display ruler binary

  fmt:
    run: cargo fmt --all
    desc: Format Rust code

  fmt-check:
    run: cargo fmt --all -- --check
    desc: Check Rust formatting

  clippy:
    run: cargo clippy --all-targets -- -D warnings
    desc: Run clippy with warnings denied

  check:
    depends_on: [fmt-check, clippy]
    desc: Run all lint checks

  test:
    depends_on: [check, build]
    run: cargo test --all
    desc: Run test suite
# cargo install cargo-audit
  vulnerability:
    run: cargo audit
    desc: Scan dependencies for known vulnerabilities

  clean:
    run: cargo clean
    desc: Clean build artifacts

  linux-arm64-musl:
    run: cargo build --locked --release --target ${{ .vars.LINUX_ARM64_MUSL_TARGET }}
    desc: Build release binary for Linux arm64 musl

  linux-amd64-musl:
    run: cargo build --locked --release --target ${{ .vars.LINUX_AMD64_MUSL_TARGET }}
    desc: Build release binary for Linux amd64 musl

  release-build-linux-amd64-musl:
    depends_on: [linux-amd64-musl]
    desc: Build Linux amd64 musl release artifacts

  release-build-linux-arm64-musl:
    depends_on: [linux-arm64-musl]
    desc: Build Linux arm64 musl release artifacts

  release-archives-linux-arm64-musl:
    depends_on: [release-build-linux-arm64-musl]
    run: |
      tar --gzip --create --directory="target/${{ .vars.LINUX_ARM64_MUSL_TARGET }}/release" --file="./${{ .vars.PROJECT_NAME }}_linux-arm64-musl.tar.gz" "${{ .vars.PROJECT_NAME }}"
    desc: Archive Linux arm64 musl release binary

  release-archives-linux-amd64-musl:
    depends_on: [release-build-linux-amd64-musl]
    run: |
      tar --gzip --create --directory="target/${{ .vars.LINUX_AMD64_MUSL_TARGET }}/release" --file="./${{ .vars.PROJECT_NAME }}_linux-amd64-musl.tar.gz" "${{ .vars.PROJECT_NAME }}"
    desc: Archive Linux amd64 musl release binary

  release-linux-amd64-musl:
    depends_on: [release-archives-linux-amd64-musl]
    desc: Build and archive Linux amd64 musl release artifacts

  release-linux-arm64-musl:
    depends_on: [release-archives-linux-arm64-musl]
    desc: Build and archive Linux arm64 musl release artifacts

  release:
    depends_on: [release-archives-linux-amd64-musl, release-archives-linux-arm64-musl]
    desc: Build and archive Linux musl release artifacts

  ci:
    depends_on: [check, test, build]
    desc: Run CI-equivalent checks
